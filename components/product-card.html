<!-- Reference markup for a LUXORA product card.
     The live version is generated by js/product-card.js (productCard()).
     Kept here as documentation of the component's structure. -->
<article class="p-card">
  <div class="p-frame">
    <div class="p-badges"><span class="p-badge new">New</span></div>
    <img class="main" src="" alt="">
    <img class="alt" src="" alt="">
    <button class="p-heart" aria-label="Save to wishlist"></button>
    <button class="p-quick">Quick add</button>
  </div>
  <div class="p-info">
    <span class="cat">Category</span>
    <a class="name" href="#">Product name</a>
    <span class="price">Rs 0</span>
    <div class="p-swatches"></div>
  </div>
</article>
