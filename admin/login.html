<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin sign in — LUXORA</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#111111">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/forms.css">
<link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="ad-login">
  <div class="ad-login-card">
    <div class="brand">LUX<span>O</span>RA</div>
    <div class="tag">Admin</div>
    <div class="field">
      <label for="email">Admin email</label>
      <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="Your password">
    </div>
    <button class="btn btn-primary btn-block" id="loginBtn">Sign in to dashboard</button>
    <p class="form-note" id="note"></p>
  </div>
</div>
<script type="module" src="../js/admin-login.js"></script>
</body>
</html>
