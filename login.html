<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — LUXORA</title>
<meta name="description" content="Sign in to your LUXORA account.">
<meta name="robots" content="noindex">
<link rel="canonical" href="https://luxora.example/login.html">
<meta property="og:title" content="Sign In — LUXORA">
<meta property="og:description" content="Sign in to your LUXORA account.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://luxora.example/login.html">
<meta name="twitter:card" content="summary">
<meta name="theme-color" content="#111111">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23111"/><text x="50" y="66" font-size="52" font-family="Georgia" fill="%23fff" text-anchor="middle">L</text></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/navbar.css"><link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="css/forms.css"><link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/polish.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<div id="navbar"></div>
<div class="auth-wrap" id="main">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to continue to LUXORA</p>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
      <span class="err-text">Enter a valid email</span>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" autocomplete="current-password" placeholder="Your password">
        <button type="button" id="pwToggle">Show</button>
      </div>
    </div>
    <div class="auth-forgot"><a href="#" id="forgot">Forgot password?</a></div>
    <button class="btn btn-primary btn-block" id="submitBtn">Sign in</button>
    <div class="auth-alt">New to LUXORA? <a href="signup.html">Create an account</a></div>
    <p class="form-note" id="note"></p>
  </div>
</div>
<div id="footer"></div>
<script type="module" src="js/login.js"></script>
</body>
</html>
